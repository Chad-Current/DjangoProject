<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Architecture — Estate Planning App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;0,700;1,300&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ── Reset & root ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #060a12;
  --bg-panel:     #0b1120;
  --bg-card:      #0f1929;
  --bg-card-h:    #131e30;
  --border:       rgba(255,255,255,0.07);
  --border-bright:rgba(255,255,255,0.15);
  --text:         #c8d8ea;
  --text-dim:     #4a5e73;
  --text-bright:  #e8f4ff;
  --mono:         'IBM Plex Mono', monospace;
  --sans:         'IBM Plex Sans', sans-serif;

  --c-edge:    #f97316;
  --c-waf:     #ef4444;
  --c-alb:     #a855f7;
  --c-app:     #3b82f6;
  --c-data:    #10b981;
  --c-storage: #f59e0b;
  --c-obs:     #06b6d4;
  --c-cicd:    #ec4899;
  --c-internet:#64748b;
}

html { font-size: 14px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ── Page wrapper ──────────────────────────────────────────────────────── */
.page {
  max-width: 1120px;
  margin: 0 auto;
  padding: 28px 20px 56px;
}

/* ── Header ───────────────────────────────────────────────────────────── */
.hd {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 5px;
  overflow: hidden;
}
.hd-rule { height: 1px; flex: 1; background: linear-gradient(to right, transparent, var(--c-edge)); }
.hd-rule.right { background: linear-gradient(to left, transparent, var(--c-edge)); }
.hd-title {
  padding: 0 20px;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--text-bright);
  white-space: nowrap;
}
.hd-badge {
  display: inline-block;
  border: 1px solid rgba(239,68,68,0.4);
  color: #ef4444;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  padding: 2px 8px;
  border-radius: 2px;
  margin-left: 10px;
  vertical-align: middle;
}
.hd-sub {
  text-align: center;
  font-size: 0.64rem;
  color: var(--text-dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

/* ── Cost ticker ──────────────────────────────────────────────────────── */
.cost-bar {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
  animation: fadeSlideDown 0.3s ease both;
}
.cost-chip {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 4px 12px;
  font-size: 0.59rem;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cost-chip .label { color: var(--text-dim); }
.cost-chip .val { color: var(--text-bright); font-weight: 700; }
.cost-chip .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}

/* ── Layer filter pills ────────────────────────────────────────────────── */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 18px;
  justify-content: center;
}
.filter-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  padding: 3px 11px;
  border-radius: 2px;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.15s ease;
  text-transform: uppercase;
}
.filter-btn:hover, .filter-btn.active {
  color: var(--text-bright);
}

/* ── Internet node ─────────────────────────────────────────────────────── */
.internet-node { text-align: center; margin-bottom: 0; animation: fadeSlideDown 0.3s ease both; }
.internet-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(100,116,139,0.1);
  border: 1px dashed rgba(100,116,139,0.35);
  border-radius: 4px;
  padding: 7px 22px;
  font-size: 0.7rem;
  color: var(--c-internet);
  letter-spacing: 0.1em;
}
.internet-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-internet); animation: pulse 2s ease infinite; }

/* ── Connector ─────────────────────────────────────────────────────────── */
.connector {
  display: flex; flex-direction: column; align-items: center;
  height: 30px; position: relative; margin: 0;
}
.connector-inner {
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.conn-line { width: 1px; }
.connector-label { font-size: 0.54rem; letter-spacing: 0.1em; color: var(--text-dim); margin: 1px 0; }
.arrow { font-size: 0.7rem; color: var(--text-dim); line-height: 1; }

/* ── Band ──────────────────────────────────────────────────────────────── */
.band {
  border-radius: 5px;
  padding: 11px 13px;
  border: 1px solid;
  border-left-width: 3px;
  transition: opacity 0.2s ease;
  animation: fadeSlideDown 0.4s ease both;
  margin-bottom: 0;
}
.band.dimmed { opacity: 0.14; pointer-events: none; }

.band-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 9px;
}
.band-label {
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  font-weight: 700;
  text-transform: uppercase;
}
.band-cost {
  font-size: 0.57rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.band-services { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Service card ──────────────────────────────────────────────────────── */
.svc {
  flex: 1 1 148px;
  min-width: 134px;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  padding: 9px 11px;
  cursor: pointer;
  transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
  position: relative;
  overflow: hidden;
  text-align: left;
}
.svc::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  opacity: 0;
  transition: opacity 0.15s;
}
.svc:hover::before { opacity: 1; }
.svc:hover { background: var(--bg-card-h); transform: translateY(-1px); }
.svc:focus-visible { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 2px; }

.svc-icon { font-size: 1rem; line-height: 1; margin-bottom: 5px; display: block; }
.svc-name { font-size: 0.67rem; font-weight: 700; color: var(--text-bright); letter-spacing: 0.03em; margin-bottom: 3px; line-height: 1.3; }
.svc-sub { font-size: 0.57rem; color: var(--text-dim); line-height: 1.45; }
.svc-tag {
  display: inline-block;
  margin-top: 4px;
  font-size: 0.52rem;
  letter-spacing: 0.08em;
  padding: 1px 5px;
  border-radius: 2px;
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
}

/* ── VPC bar ───────────────────────────────────────────────────────────── */
.vpc-bar {
  margin-top: 14px;
  border: 1px dashed rgba(59,130,246,0.28);
  border-radius: 5px;
  background: rgba(59,130,246,0.03);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  animation: fadeSlideDown 0.5s 0.35s ease both;
}
.vpc-cidr { font-size: 0.67rem; color: #3b82f6; font-weight: 700; letter-spacing: 0.1em; white-space: nowrap; }
.vpc-note { font-size: 0.6rem; color: var(--text-dim); }
.vpc-sg {
  font-size: 0.58rem;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.vpc-sg span {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 2px;
  padding: 1px 7px;
  white-space: nowrap;
}
.vpc-dr { margin-left: auto; font-size: 0.6rem; color: var(--text-dim); white-space: nowrap; }

/* ── Security pillars ──────────────────────────────────────────────────── */
.pillars {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 8px;
  animation: fadeSlideDown 0.5s 0.45s ease both;
}
@media (max-width: 700px) { .pillars { grid-template-columns: repeat(2, 1fr); } }
.pillar {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 9px;
}
.pillar-lbl { font-size: 0.61rem; color: var(--text-bright); font-weight: 600; margin-bottom: 2px; letter-spacing: 0.04em; }
.pillar-val { font-size: 0.56rem; color: var(--text-dim); line-height: 1.5; }

/* ── Scale path ────────────────────────────────────────────────────────── */
.scale-bar {
  margin-top: 8px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 0;
  animation: fadeSlideDown 0.5s 0.5s ease both;
  overflow-x: auto;
}
.scale-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
}
.scale-year {
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}
.scale-users { font-size: 0.58rem; color: var(--text-dim); }
.scale-cost { font-size: 0.62rem; font-weight: 700; margin-top: 2px; }
.scale-sep {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(255,255,255,0.08), rgba(255,255,255,0.08));
  position: relative;
  min-width: 30px;
}
.scale-sep::after {
  content: '→';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.7rem;
  color: var(--text-dim);
  background: var(--bg);
  padding: 0 3px;
}

/* ── Tooltip ───────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: #090f1c;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 5px;
  padding: 11px 14px;
  font-family: var(--mono);
  font-size: 0.65rem;
  max-width: 260px;
  pointer-events: none;
  z-index: 9999;
  box-shadow: 0 24px 48px rgba(0,0,0,0.8);
  display: none;
}
#tooltip.visible { display: block; animation: tooltipIn 0.1s ease; }
#tooltip-title { font-weight: 700; color: var(--text-bright); margin-bottom: 7px; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
#tooltip-tier { font-size: 0.57rem; color: var(--text-dim); margin-bottom: 7px; }
.tt-row { display: flex; gap: 6px; margin-bottom: 4px; line-height: 1.45; }
.tt-arrow { color: #06b6d4; flex-shrink: 0; }
.tt-text { color: #8faec8; }
.tt-cost { color: #10b981; font-weight: 600; margin-top: 7px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 0.6rem; }

/* ── Hint bar ──────────────────────────────────────────────────────────── */
.hint {
  text-align: center;
  margin-top: 14px;
  font-size: 0.57rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  animation: fadeSlideDown 0.5s 0.55s ease both;
}

/* ── Animations ────────────────────────────────────────────────────────── */
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
@keyframes tooltipIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

.band:nth-child(odd)  { animation-delay: 0.05s; }
.band:nth-child(even) { animation-delay: 0.12s; }

@media (max-width: 600px) {
  .hd-title { font-size: 0.85rem; letter-spacing: 0.12em; }
  .svc { flex: 1 1 100%; }
  .cost-bar { gap: 5px; }
}
</style>
</head>

// Tooltip
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tooltip-title');
const ttTier  = document.getElementById('tooltip-tier');
const ttBody  = document.getElementById('tooltip-body');

function showTip(e, svc, color) {
  ttTitle.textContent = svc.name;
  ttTitle.style.color = color;
  ttTier.textContent  = svc.tier || '';
  ttBody.innerHTML = (svc.details || []).map(d =>
    `<div class="tt-row"><span class="tt-arrow">›</span><span class="tt-text">${escHtml(d)}</span></div>`
  ).join('');
  tooltip.classList.add('visible');
  positionTip(e);
}
function positionTip(e) {
  const pad = 14, tw = 268, th = 160;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tw > window.innerWidth)  x = e.clientX - tw - pad;
  if (y + th > window.innerHeight) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTip() { tooltip.classList.remove('visible'); }

// Filter
let activeLayer = 'all';
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeLayer = btn.dataset.layer;

  document.querySelectorAll('.filter-btn').forEach(b => {
    const on = b.dataset.layer === activeLayer;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
    const c = colorOf[b.dataset.layer];
    if (on && c) {
      b.style.borderColor = c; b.style.color = c; b.style.background = c + '18';
    } else {
      b.style.borderColor = ''; b.style.color = ''; b.style.background = '';
    }
  });

  document.querySelectorAll('.band').forEach(band => {
    band.classList.toggle('dimmed', activeLayer !== 'all' && band.dataset.layer !== activeLayer);
  });
});

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
