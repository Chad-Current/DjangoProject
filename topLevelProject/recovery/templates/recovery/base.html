{% extends 'dashboard/base_dashboard.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'baseapp/css/forms.css' %}" type="text/css">
<style>
  /* ── Recovery page wrapper ───────────────────────── */
  .recovery-page { padding: 2rem 0 4rem; }

  /* ── Cards ───────────────────────────────────────── */
  .card {
    border: 1.5px solid rgba(45,106,156,0.12);
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(22,40,59,0.08);
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, var(--thirty-percent) 0%, var(--ten-percent) 100%);
    color: var(--text-color);
    border-radius: 15px 15px 0 0 !important;
    padding: 1rem 1.5rem;
    border-bottom: none;
  }
  .card-header h4,
  .card-header h5 {
    color: var(--text-color);
    font-family: var(--main-font);
    font-weight: 700;
  }
  /* Danger header override (cancel page) */
  .card-header.bg-danger { background: #c0392b !important; }

  .card-body { padding: 1.5rem; }

  /* ── Info sections (detail / status views) ───────── */
  .info-section {
    background: var(--background-color);
    border: 1.5px solid rgba(45,106,156,0.1);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .info-section h5 {
    font-family: var(--main-font);
    font-size: var(--font-md);
    font-weight: 700;
    color: var(--ten-percent);
    margin-bottom: 0.85rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--seventy-percent);
  }
  .info-row {
    display: flex;
    gap: 1rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--seventy-percent);
    align-items: flex-start;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    font-family: var(--main-font);
    font-weight: 700;
    font-size: var(--font-sm);
    color: var(--forty-percent);
    min-width: 170px;
    flex-shrink: 0;
  }
  .info-value {
    font-family: var(--paragraph-font);
    font-size: var(--font-nm);
    color: var(--text-color-dark);
    flex: 1;
  }

  /* ── Status badges ────────────────────────────────── */
  .status-badge {
    display: inline-block;
    padding: 0.35rem 0.9rem;
    border-radius: 50px;
    font-family: var(--main-font);
    font-size: var(--font-sm);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .status-pendingverification { background: rgba(255,166,43,0.12); color: #7a4a00;           border: 1.5px solid rgba(255,166,43,0.4); }
  .status-verified            { background: rgba(45,106,156,0.1);  color: var(--thirty-percent); border: 1.5px solid rgba(45,106,156,0.3); }
  .status-inprogress          { background: rgba(39,174,96,0.1);   color: #1e8449;           border: 1.5px solid rgba(39,174,96,0.3); }
  .status-completed           { background: rgba(39,174,96,0.14);  color: #155724;           border: 1.5px solid rgba(39,174,96,0.45); }
  .status-denied              { background: rgba(192,57,43,0.08);  color: #c0392b;           border: 1.5px solid rgba(192,57,43,0.3); }
  .status-cancelled           { background: rgba(108,117,125,0.1); color: #495057;           border: 1.5px solid rgba(108,117,125,0.25); }

  /* ── File upload widget ───────────────────────────── */
  .file-upload-label {
    cursor: pointer;
    padding: 1.25rem;
    background: var(--background-color);
    border: 2px dashed rgba(45,106,156,0.28);
    border-radius: 10px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 0.25rem;
  }
  .file-upload-label:hover {
    border-color: var(--thirty-percent);
    background: rgba(45,106,156,0.04);
  }
  .file-upload-label input[type="file"] { display: none; }

  /* ── Required asterisk ────────────────────────────── */
  .required-field::after { content: " *"; color: #c0392b; }

  /* ── Table styling ────────────────────────────────── */
  .table thead th {
    font-family: var(--main-font);
    font-size: var(--font-sm);
    font-weight: 700;
    color: var(--ten-percent);
    background: var(--background-color);
    border-bottom: 2px solid rgba(45,106,156,0.18);
    padding: 0.85rem 0.75rem;
  }
  .table tbody td {
    font-family: var(--paragraph-font);
    font-size: var(--font-nm);
    color: var(--text-color-dark);
    vertical-align: middle;
    padding: 0.85rem 0.75rem;
    border-bottom: 1px solid rgba(45,106,156,0.08);
  }
  .table-hover tbody tr:hover { background: rgba(45,106,156,0.04); }

  /* ── Keep small/inline buttons compact ───────────── */
  .btn-sm { width: auto !important; min-width: unset !important; }
  .btn-outline-secondary,
  .btn-outline-danger,
  .btn-outline-primary { width: auto; }
</style>
{% endblock %}

{% block content %}
<div class="container recovery-page">
  {% block recovery_content %}{% endblock %}
</div>
{% endblock %}
